version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memoryweb
      POSTGRES_PASSWORD: memoryweb
      POSTGRES_DB: memoryweb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryweb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8100:8100"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs

  celery:
    build: ./backend
    command: celery -A app.celery_app worker -Q default --concurrency=4 --loglevel=info
    env_file: .env
    depends_on:
      - backend
      - redis

volumes:
  pgdata:
  redisdata:
